apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: frontend
  labels:
    course: DevOps 
    now: K8s 
spec:
  replicas: 3
  selector:
    matchLabels:
      course: DevOps 
      now: K8s
  template:
    metadata:
      labels:
        course: DevOps 
        now: K8s
    spec:
      containers:
      - name: nginx
        image: nginx