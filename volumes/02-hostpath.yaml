apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ds-hostpath-demo
  namespace: default
spec:
  selector:
    matchLabels:
      app: hostpath-demo
  template:
    metadata:
      labels:
        app: hostpath-demo
    spec:
      containers:
      - name: busybox
        image: busybox
        command: ["sh", "-c", "sleep 3600"]
        volumeMounts:
        - name: node-log
          mountPath: /node-logs
          readOnly: true

      volumes:
      - name: node-log
        hostPath:
          path: /var/log
          type: Directory