apiVersion: v1
kind: Pod 
metadata:
  name: emptydir-demo 
  namespace: default
spec:
  containers:
  - name: nginx
    image: nginx
    volumeMounts:
    - name: volume
      mountPath: /var/log/nginx/
  - name: almalinux
    image: almalinux:9
    command: ["sleep","2000"]
    volumeMounts:
    - name: volume
      mountPath: /heman
      readOnly: true
  volumes:
  - name: volume
    emptyDir: {}