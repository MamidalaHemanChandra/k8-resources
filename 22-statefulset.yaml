apiVersion: v1
kind: Service
metadata:
  name: nginx-headless
  labels:
    purpose: statefulset-demo
    app: nginx
spec:
  ports:
  - port: 80
    name: web
  clusterIP: None
  selector:
    purpose: statefulset-demo
    app: nginx
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
  labels:
    purpose: statefulset-demo
    app: nginx
spec:
  ports:
  - port: 80
    name: web
  selector:
    purpose: statefulset-demo
    app: nginx
---
apiVersion: storage.k8s.io/v1
kind: StorageClass  
metadata:
  name: ebs-dynamic-sc
provisioner: ebs.csi.aws.com
reclaimPolicy: Retain
volumeBindingMode: WaitForFirstConsumer
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: statefulset-demo
spec:
  selector:
    matchLabels:
      purpose: statefulset-demo
      app: nginx
  serviceName: nginx-headless
  replicas: 3 
  template:
    metadata:
      labels:
        purpose: statefulset-demo
        app: nginx 
    spec:
      containers:
      - name: nginx
        image: nginx
        ports:
        - containerPort: 80
          name: web
        volumeMounts:
        - name: nginx
          mountPath: /usr/share/nginx/html
  volumeClaimTemplates:
  - metadata:
      name: nginx
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: "ebs-dynamic-sc"
      resources:
        requests:
          storage: 1Gi