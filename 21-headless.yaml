apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    purpose: headless-demo
    course: K8s 
spec:
  replicas: 3
  selector:
    matchLabels:
      purpose: headless-demo
      course: K8s
  template:
    metadata:
      labels:
        purpose: headless-demo
        course: K8s
    spec:
      containers:
      - name: nginx
        image: nginx
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  type: LoadBalancer
  selector:
    purpose: headless-demo
    course: K8s
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-headless
spec:
  clusterIP: None
  selector:
    purpose: headless-demo
    course: K8s
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80